<script>
(function () {
  let current = 0;
  const track  = document.getElementById('carouselTrack');
  const dotsEl = document.getElementById('carouselDots');
  const slides = document.querySelectorAll('.carousel-slide');
  const total  = slides.length;

  if (total === 0) return;

  slides.forEach((_, i) => {
    const d = document.createElement('span');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', () => goToSlide(i));
    dotsEl.appendChild(d);
  });

  function goToSlide(index) {
    current = ((index % total) + total) % total;
    track.style.transform = `translateX(-${current * 100}%)`;
    dotsEl.querySelectorAll('.dot').forEach((d, i) =>
      d.classList.toggle('active', i === current)
    );
  }

  document.querySelector('.prev').addEventListener('click', () => goToSlide(current - 1));
  document.querySelector('.next').addEventListener('click', () => goToSlide(current + 1));

  let tx = 0;
  track.addEventListener('touchstart', e => tx = e.changedTouches[0].clientX, { passive: true });
  track.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    if (Math.abs(dx) > 40) goToSlide(current + (dx < 0 ? 1 : -1));
  });

  setInterval(() => goToSlide(current + 1), 6000);
})();
</script>
